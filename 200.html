<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopFlow - 电商数据仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--sidebar-w:240px;--topbar-h:68px;--bg:#F8FAFC;--card-bg:#fff;--sidebar-bg:#1E1B4B;--sidebar-active:rgba(79,70,229,0.3);--primary:#4F46E5;--primary-light:#EEF2FF;--green:#059669;--green-light:#ECFDF5;--orange:#EA580C;--orange-light:#FFF7ED;--pink:#DB2777;--pink-light:#FDF2F8;--red:#EF4444;--text-dark:#1E293B;--text-mid:#475569;--text-light:#94A3B8;--border:#E2E8F0;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08);--transition:all .3s cubic-bezier(.4,0,.2,1);}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text-dark);overflow-x:hidden;}
.sidebar{position:fixed;left:0;top:0;width:var(--sidebar-w);height:100vh;background:var(--sidebar-bg);z-index:100;transition:var(--transition);display:flex;flex-direction:column;}
.sidebar.collapsed{width:68px;}.sidebar.collapsed .nav-text,.sidebar.collapsed .logo-text,.sidebar.collapsed .user-info{display:none;}.sidebar.collapsed .logo{justify-content:center;}.sidebar.collapsed .nav-item{justify-content:center;padding:0 12px;}.sidebar.collapsed .nav-item .nav-icon{margin-right:0;}
.logo{display:flex;align-items:center;padding:20px 24px;gap:12px;}.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#4F46E5,#7C3AED);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:18px;flex-shrink:0;}.logo-text{font-size:18px;font-weight:bold;color:#fff;white-space:nowrap;}
.sidebar-divider{height:1px;background:#312E81;margin:0 24px;}
.nav{flex:1;padding:12px;overflow-y:auto;}.nav-item{display:flex;align-items:center;padding:12px 16px;border-radius:8px;cursor:pointer;transition:var(--transition);margin-bottom:4px;position:relative;color:#6366F1;opacity:.6;}.nav-item:hover{opacity:1;background:rgba(99,102,241,.1);}.nav-item.active{opacity:1;background:var(--sidebar-active);color:#C7D2FE;}.nav-item.active::before{content:'';position:absolute;left:0;top:0;width:4px;height:100%;background:#818CF8;border-radius:0 4px 4px 0;}.nav-icon{font-size:18px;margin-right:12px;flex-shrink:0;width:24px;text-align:center;}.nav-text{font-size:14px;white-space:nowrap;}
.sidebar-bottom{padding:16px 20px;border-top:1px solid #312E81;}.user-row{display:flex;align-items:center;gap:12px;}.user-avatar{width:36px;height:36px;border-radius:50%;background:#4F46E5;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:bold;font-size:14px;flex-shrink:0;}.user-info .user-name{font-size:13px;color:#E0E7FF;font-weight:600;}.user-info .user-email{font-size:11px;color:#6366F1;}
.main{margin-left:var(--sidebar-w);transition:var(--transition);}.sidebar.collapsed~.main{margin-left:68px;}
.topbar{height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:sticky;top:0;z-index:50;}.topbar-left{display:flex;align-items:center;gap:16px;}.toggle-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:var(--transition);}.toggle-btn:hover{background:#F1F5F9;}.page-info h1{font-size:20px;font-weight:bold;}.page-info p{font-size:12px;color:var(--text-light);}
.topbar-right{display:flex;align-items:center;gap:12px;}.date-picker{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:#F1F5F9;font-size:12px;color:var(--text-mid);cursor:pointer;display:flex;align-items:center;gap:6px;}.date-picker select{border:none;background:transparent;font-size:12px;color:var(--text-mid);cursor:pointer;outline:none;}.noti-btn{position:relative;width:36px;height:36px;border-radius:50%;background:#F1F5F9;border:none;cursor:pointer;font-size:16px;}.noti-badge{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:#EF4444;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:bold;}.export-btn{padding:8px 20px;border-radius:8px;border:none;background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);}.export-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.4);}
.content{padding:24px 32px;}.page-section{display:none;}.page-section.active{display:block;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px;}.stat-card{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden;cursor:pointer;transition:var(--transition);}.stat-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);}.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--radius) var(--radius) 0 0;}.stat-card:nth-child(1)::before{background:linear-gradient(90deg,#4F46E5,#7C3AED);}.stat-card:nth-child(2)::before{background:linear-gradient(90deg,#059669,#10B981);}.stat-card:nth-child(3)::before{background:linear-gradient(90deg,#EA580C,#F97316);}.stat-card:nth-child(4)::before{background:linear-gradient(90deg,#DB2777,#EC4899);}
.stat-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;}.stat-card:nth-child(1) .stat-icon{background:var(--primary-light);}.stat-card:nth-child(2) .stat-icon{background:var(--green-light);}.stat-card:nth-child(3) .stat-icon{background:var(--orange-light);}.stat-card:nth-child(4) .stat-icon{background:var(--pink-light);}.stat-label{font-size:13px;color:var(--text-light);}.stat-value{font-size:28px;font-weight:bold;margin-bottom:8px;}.stat-trend{font-size:12px;display:flex;align-items:center;gap:6px;}.stat-trend.up{color:var(--green);}.stat-trend.down{color:var(--red);}.stat-trend span{color:var(--text-light);}
.charts-row{display:grid;grid-template-columns:1.75fr 1fr;gap:20px;margin-bottom:24px;}.chart-card{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);}.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}.chart-title{font-size:16px;font-weight:bold;}.chart-subtitle{font-size:11px;color:var(--text-light);margin-top:2px;}.chart-tabs{display:flex;gap:4px;}.chart-tab{padding:6px 14px;border-radius:6px;font-size:11px;border:none;background:#F1F5F9;color:var(--text-mid);cursor:pointer;transition:var(--transition);}.chart-tab.active{background:var(--primary);color:#fff;}.chart-container{position:relative;height:260px;}
.bottom-row{display:grid;grid-template-columns:1.75fr 1fr;gap:20px;}.table-card{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);}.table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}.table-actions{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btn,.view-all-btn{padding:6px 14px;border-radius:6px;font-size:11px;border:none;cursor:pointer;transition:var(--transition);}.filter-btn{background:#F1F5F9;color:var(--text-mid);}.filter-btn:hover{background:#E2E8F0;}.filter-btn.active{background:var(--primary);color:#fff;}.view-all-btn{background:#F1F5F9;color:var(--primary);font-weight:600;}
table{width:100%;border-collapse:collapse;}thead th{padding:10px 12px;text-align:left;font-size:11px;color:var(--text-light);font-weight:600;background:#F8FAFC;border-bottom:1px solid var(--border);}tbody td{padding:12px;font-size:12px;color:var(--text-mid);border-bottom:1px solid #F1F5F9;}tbody tr{transition:var(--transition);cursor:pointer;}tbody tr:hover{background:#FAFBFD;}.order-id{color:var(--primary);font-weight:500;}.amount{font-weight:600;color:var(--text-dark);}
.status-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:10px;font-weight:600;}.status-badge.completed{background:var(--green-light);color:var(--green);}.status-badge.shipping{background:#FEF3C7;color:#D97706;}.status-badge.pending{background:var(--primary-light);color:var(--primary);}.status-badge.refunded{background:#FEE2E2;color:#DC2626;}.status-badge.cancelled{background:#F1F5F9;color:var(--text-light);}.status-badge.active{background:var(--green-light);color:var(--green);}.status-badge.inactive{background:#FEE2E2;color:var(--red);}.status-badge.low{background:#FEF3C7;color:#D97706;}.status-badge.vip{background:#FDF2F8;color:var(--pink);}.status-badge.normal{background:#F1F5F9;color:var(--text-mid);}.status-badge.ongoing{background:var(--primary-light);color:var(--primary);}.status-badge.ended{background:#F1F5F9;color:var(--text-light);}.status-badge.scheduled{background:#FEF3C7;color:#D97706;}
.toast{position:fixed;top:80px;right:32px;padding:14px 24px;border-radius:10px;background:#1E293B;color:#fff;font-size:13px;z-index:200;transform:translateX(120%);transition:transform .4s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 24px rgba(0,0,0,.2);display:flex;align-items:center;gap:10px;}.toast.show{transform:translateX(0);}.toast .toast-icon{font-size:18px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}.modal-overlay.show{display:flex;}.modal{background:#fff;border-radius:16px;padding:32px;width:520px;max-width:90vw;box-shadow:0 24px 48px rgba(0,0,0,.2);animation:modalIn .3s ease;}@keyframes modalIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}.modal h2{font-size:18px;margin-bottom:8px;}.modal p{font-size:13px;color:var(--text-mid);margin-bottom:20px;}.modal-detail{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}.modal-detail .item{padding:12px;background:#F8FAFC;border-radius:8px;}.modal-detail .item label{font-size:11px;color:var(--text-light);display:block;margin-bottom:4px;}.modal-detail .item span{font-size:14px;font-weight:600;}.modal-close{width:100%;padding:10px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;}.modal-close:hover{background:#4338CA;}
.search-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}.search-bar input{flex:1;min-width:200px;padding:10px 16px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;transition:var(--transition);}.search-bar input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,70,229,.1);}.search-bar button{padding:10px 20px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:13px;font-weight:600;cursor:pointer;}.search-bar select{padding:10px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;background:#fff;}
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:16px;font-size:12px;color:var(--text-light);}.pagination .pages{display:flex;gap:4px;}.pagination .pages button{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;transition:var(--transition);}.pagination .pages button.active{background:var(--primary);color:#fff;border-color:var(--primary);}.pagination .pages button:hover:not(.active){background:#F1F5F9;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px;}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px;}
.form-card{background:var(--card-bg);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:20px;}.form-group{margin-bottom:16px;}.form-group label{display:block;font-size:12px;color:var(--text-light);margin-bottom:6px;font-weight:600;}.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--border);font-size:13px;outline:none;transition:var(--transition);}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);}.form-group textarea{height:80px;resize:vertical;}
.switch{position:relative;display:inline-block;width:44px;height:24px;}.switch input{opacity:0;width:0;height:0;}.slider{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:24px;transition:.3s;}.slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}input:checked+.slider{background:var(--primary);}input:checked+.slider::before{transform:translateX(20px);}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;margin-right:4px;}.tag.blue{background:var(--primary-light);color:var(--primary);}.tag.green{background:var(--green-light);color:var(--green);}.tag.orange{background:var(--orange-light);color:var(--orange);}.tag.pink{background:var(--pink-light);color:var(--pink);}
.progress-bar{width:100%;height:8px;background:#F1F5F9;border-radius:4px;overflow:hidden;}.progress-bar .fill{height:100%;border-radius:4px;transition:width .6s ease;}
@media(max-width:1200px){.stats-grid{grid-template-columns:repeat(2,1fr);}.charts-row,.bottom-row,.grid-2,.grid-3{grid-template-columns:1fr;}}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.mobile-open{transform:translateX(0);}.main{margin-left:0!important;}.stats-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <div class="logo"><div class="logo-icon">S</div><span class="logo-text">ShopFlow</span></div>
  <div class="sidebar-divider"></div>
  <nav class="nav">
    <div class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span><span class="nav-text">数据概览</span></div>
    <div class="nav-item" data-page="orders"><span class="nav-icon">📦</span><span class="nav-text">订单管理</span></div>
    <div class="nav-item" data-page="products"><span class="nav-icon">🏷️</span><span class="nav-text">商品管理</span></div>
    <div class="nav-item" data-page="customers"><span class="nav-icon">👥</span><span class="nav-text">客户管理</span></div>
    <div class="nav-item" data-page="marketing"><span class="nav-icon">📣</span><span class="nav-text">营销活动</span></div>
    <div class="nav-item" data-page="finance"><span class="nav-icon">💰</span><span class="nav-text">财务报表</span></div>
    <div class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span><span class="nav-text">系统设置</span></div>
  </nav>
  <div class="sidebar-bottom"><div class="user-row"><div class="user-avatar">A</div><div class="user-info"><div class="user-name">Admin</div><div class="user-email">admin@shopflow.com</div></div></div></div>
</aside>

<div class="main" id="main">
  <header class="topbar">
    <div class="topbar-left"><button class="toggle-btn" id="toggleSidebar">☰</button><div class="page-info"><h1 id="pageTitle">数据概览</h1><p id="pageDesc">欢迎回来，这是今天的业务数据摘要</p></div></div>
    <div class="topbar-right"><div class="date-picker">📅 <select id="dateRange"><option value="7">最近7天</option><option value="30" selected>最近30天</option><option value="90">最近90天</option><option value="365">最近一年</option></select></div><button class="noti-btn" id="notiBtn">🔔<span class="noti-badge">3</span></button><button class="export-btn" id="exportBtn">导出报表</button></div>
  </header>
  <div class="content" id="contentArea"></div>
</div>

<div class="toast" id="toast"><span class="toast-icon"></span><span class="toast-msg"></span></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal"><h2 id="modalTitle"></h2><p id="modalSubtitle"></p><div class="modal-detail" id="modalDetail"></div><button class="modal-close" onclick="closeModal()">关闭</button></div></div>

<script>
// ===================== SEED DATA =====================
const NAMES=['王小明','李芳芳','张伟','陈思思','刘强','赵雨晴','孙浩然','周美琪','吴磊','郑欣怡','黄建国','林晓峰','马丽华','何志远','胡雪梅','杨洋','朱俊杰','徐婷婷','罗海波','谢文静','唐小龙','韩梅梅','冯大伟','曹雪琴','邓超','宋佳','彭丽媛','潘安','蒋勤勤','蔡明'];
const PRODUCTS=[
  {name:'iPhone 16 Pro',cat:'数码',price:8999,stock:580,sold:2340},
  {name:'AirPods Pro 3',cat:'数码',price:1899,stock:1200,sold:1960},
  {name:'小米手环9',cat:'数码',price:249,stock:3500,sold:1580},
  {name:'MacBook Pro M4',cat:'数码',price:16999,stock:320,sold:680},
  {name:'索尼WH-1000XM6',cat:'数码',price:2499,stock:450,sold:920},
  {name:'戴森吹风机',cat:'家居',price:3199,stock:280,sold:1210},
  {name:'Dyson V15',cat:'家居',price:4990,stock:190,sold:560},
  {name:'小米扫地机器人',cat:'家居',price:2999,stock:620,sold:880},
  {name:'雅诗兰黛精华',cat:'美妆',price:680,stock:890,sold:890},
  {name:'兰蔻小黑瓶',cat:'美妆',price:960,stock:750,sold:720},
  {name:'SK-II神仙水',cat:'美妆',price:1540,stock:480,sold:520},
  {name:'优衣库联名T恤',cat:'服饰',price:99,stock:5000,sold:3200},
  {name:'Nike Air Max',cat:'服饰',price:1299,stock:680,sold:1450},
  {name:'Levi\'s 501',cat:'服饰',price:599,stock:900,sold:1100},
  {name:'三只松鼠坚果礼盒',cat:'食品',price:168,stock:2200,sold:1800},
  {name:'Nintendo Switch 2',cat:'数码',price:2599,stock:150,sold:420},
  {name:'小米SU7 Ultra',cat:'数码',price:529900,stock:5,sold:12},
  {name:'iPad Air M3',cat:'数码',price:5999,stock:400,sold:760},
  {name:'华为Mate 70 Pro',cat:'数码',price:6999,stock:350,sold:1100},
  {name:'蒙牛纯牛奶箱装',cat:'食品',price:58,stock:8000,sold:5600},
];
const STATUSES=['completed','shipping','pending','refunded','cancelled'];
const STATUS_LABELS={completed:'已完成',shipping:'配送中',pending:'待付款',refunded:'已退款',cancelled:'已取消'};
const CITIES=['北京','上海','广州','深圳','杭州','成都','武汉','南京','西安','重庆','天津','苏州','长沙','郑州','东莞'];
const PAYMENTS=['微信支付','支付宝','银联','信用卡','花呗','京东白条'];

// Generate 200 historical orders spanning 90 days
const allOrders=[];
for(let i=0;i<200;i++){
  const daysAgo=Math.floor(Math.random()*90);
  const d=new Date();d.setDate(d.getDate()-daysAgo);
  const h=Math.floor(Math.random()*24),m=Math.floor(Math.random()*60);
  const prod=PRODUCTS[Math.floor(Math.random()*PRODUCTS.length)];
  const qty=Math.floor(Math.random()*3)+1;
  allOrders.push({
    id:'ORD-'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+String(i+1).padStart(3,'0'),
    customer:NAMES[Math.floor(Math.random()*NAMES.length)],
    product:prod.name,category:prod.cat,
    amount:prod.price*qty,qty,
    status:STATUSES[Math.floor(Math.random()*5)],
    date:d,dateStr:`${d.getMonth()+1}/${d.getDate()} ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`,
    city:CITIES[Math.floor(Math.random()*CITIES.length)],
    payment:PAYMENTS[Math.floor(Math.random()*PAYMENTS.length)]
  });
}
allOrders.sort((a,b)=>b.date-a.date);

// Generate customers
const allCustomers=NAMES.map((n,i)=>{
  const orders=allOrders.filter(o=>o.customer===n);
  const totalSpent=orders.reduce((s,o)=>s+o.amount,0);
  return{id:'CUS-'+String(i+1).padStart(4,'0'),name:n,email:n.replace(/./g,c=>c.charCodeAt(0)>127?'':'')+'@email.com',phone:'138'+String(Math.floor(Math.random()*100000000)).padStart(8,'0'),city:CITIES[Math.floor(Math.random()*CITIES.length)],orders:orders.length,totalSpent,level:totalSpent>50000?'vip':'normal',regDate:new Date(2025,Math.floor(Math.random()*12),Math.floor(Math.random()*28)+1)};
});

// Campaigns
const campaigns=[
  {id:1,name:'新年大促',type:'满减',discount:'满300减50',start:'2026-01-01',end:'2026-01-15',status:'ended',budget:50000,spent:48200,orders:1260,revenue:386000},
  {id:2,name:'情人节特惠',type:'折扣',discount:'全场8折',start:'2026-02-10',end:'2026-02-14',status:'ended',budget:30000,spent:28500,orders:820,revenue:215000},

// Compute dashboard stats from real data
function computeStats(days){
  const now=new Date();const cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-days);
  const prevCutoff=new Date(cutoff);prevCutoff.setDate(prevCutoff.getDate()-days);
  const current=allOrders.filter(o=>o.date>=cutoff);
  const prev=allOrders.filter(o=>o.date>=prevCutoff&&o.date<cutoff);
  const totalSales=current.reduce((s,o)=>s+o.amount,0);
  const prevSales=prev.reduce((s,o)=>s+o.amount,0);
  const totalOrders=current.length;const prevOrders=prev.length;
  const users=new Set(current.map(o=>o.customer)).size;const prevUsers=new Set(prev.map(o=>o.customer)).size;
  const conv=totalOrders>0?(totalOrders/(users*10)*100):0;const prevConv=prevOrders>0?(prevOrders/(prevUsers*10)*100):0;
  return{
    sales:totalSales,salesDelta:prevSales?((totalSales-prevSales)/prevSales*100):0,
    orders:totalOrders,ordersDelta:prevOrders?((totalOrders-prevOrders)/prevOrders*100):0,
    users,usersDelta:prevUsers?((users-prevUsers)/prevUsers*100):0,
    conv:conv.toFixed(2),convDelta:(conv-prevConv).toFixed(2)
  };
}

function getDailySales(days){
  const now=new Date();const labels=[];const sales=[];const orders=[];const prevSales=[];
  for(let i=days-1;i>=0;i--){
    const d=new Date(now);d.setDate(d.getDate()-i);
    const dayOrders=allOrders.filter(o=>o.date.toDateString()===d.toDateString());
    labels.push((d.getMonth()+1)+'/'+d.getDate());
    sales.push(dayOrders.reduce((s,o)=>s+o.amount,0));
    orders.push(dayOrders.length);
    // previous period comparison
    const pd=new Date(d);pd.setDate(pd.getDate()-days);
    const prevDayOrders=allOrders.filter(o=>o.date.toDateString()===pd.toDateString());
    prevSales.push(prevDayOrders.reduce((s,o)=>s+o.amount,0));
  }
  const totalSales=sales.reduce((a,b)=>a+b,0);
  const totalOrders=orders.reduce((a,b)=>a+b,0);
  const avgSales=Math.round(totalSales/days);
  const maxSales=Math.max(...sales);const minSales=Math.min(...sales);
  const maxIdx=sales.indexOf(maxSales);const minIdx=sales.indexOf(minSales);
  return{labels,sales,orders,prevSales,totalSales,totalOrders,avgSales,maxSales,minSales,maxIdx,minIdx,days};
}

function getCategorySales(){
  const cats={};allOrders.forEach(o=>{cats[o.category]=(cats[o.category]||0)+o.amount;});
  const total=Object.values(cats).reduce((a,b)=>a+b,0);
  return{labels:Object.keys(cats),values:Object.values(cats).map(v=>Math.round(v/total*100)),amounts:Object.values(cats)};
}

window.switchChartType=function(type){
  window._salesChartType=type;
  document.getElementById('viewLine').classList.toggle('active',type==='line');
  document.getElementById('viewBar').classList.toggle('active',type==='bar');
  // Find current active days
  const tabGroup=document.querySelectorAll('.chart-tabs')[0];
  let days=30;
  if(tabGroup){tabGroup.querySelectorAll('.chart-tab').forEach((t,i)=>{if(t.classList.contains('active'))days=[7,30,90][i];});}
  switchSalesView(days);
};

let orderPage=1;const orderPageSize=15;let orderSearch='';let orderStatusFilter='all';
function renderOrders(el){
  let filtered=allOrders.filter(o=>(orderStatusFilter==='all'||o.status===orderStatusFilter)&&(orderSearch===''||o.id.includes(orderSearch)||o.customer.includes(orderSearch)||o.product.includes(orderSearch)));
  const totalPages=Math.ceil(filtered.length/orderPageSize);
  if(orderPage>totalPages)orderPage=totalPages||1;
  const paged=filtered.slice((orderPage-1)*orderPageSize,orderPage*orderPageSize);
  el.innerHTML=`
  <div class="search-bar"><input type="text" id="orderSearchInput" placeholder="搜索订单编号、客户、商品..." value="${orderSearch}"><select id="orderStatusSelect"><option value="all">全部状态</option>${Object.entries(STATUS_LABELS).map(([k,v])=>`<option value="${k}" ${orderStatusFilter===k?'selected':''}>${v}</option>`).join('')}</select><button onclick="orderSearch=document.getElementById('orderSearchInput').value;orderStatusFilter=document.getElementById('orderStatusSelect').value;orderPage=1;renderOrders(document.getElementById('contentArea'));">搜索</button></div>
  <div class="table-card"><table><thead><tr><th>订单编号</th><th>客户</th><th>商品</th><th>分类</th><th>数量</th><th style="cursor:pointer" onclick="sortOrdersBy('amount')">金额 ↕</th><th>状态</th><th>城市</th><th>支付</th><th>时间</th></tr></thead>
  <tbody>${paged.map(o=>`<tr onclick="showOrderModal('${o.id}')"><td class="order-id">#${o.id}</td><td>${o.customer}</td><td>${o.product}</td><td><span class="tag blue">${o.category}</span></td><td>${o.qty}</td><td class="amount">¥${o.amount.toLocaleString()}</td><td><span class="status-badge ${o.status}">${STATUS_LABELS[o.status]}</span></td><td>${o.city}</td><td>${o.payment}</td><td style="color:var(--text-light)">${o.dateStr}</td></tr>`).join('')}</tbody></table>
  <div class="pagination"><span>共 ${filtered.length} 条，第 ${orderPage}/${totalPages} 页</span><div class="pages">${Array.from({length:Math.min(totalPages,7)},(_,i)=>{const p=i+1;return`<button class="${p===orderPage?'active':''}" onclick="orderPage=${p};renderOrders(document.getElementById('contentArea'))">${p}</button>`;}).join('')}</div></div></div>`;
}

    <td style="font-weight:600">${c.name}</td><td><span class="tag ${c.type==='满减'?'orange':c.type==='折扣'?'blue':'green'}">${c.type}</span></td><td>${c.discount}</td><td>${c.start}</td><td>${c.end}</td><td><span class="status-badge ${c.status}">${c.status==='ongoing'?'进行中':c.status==='ended'?'已结束':'待开始'}</span></td><td>¥${c.budget.toLocaleString()}</td><td>¥${c.spent.toLocaleString()}</td><td>${c.orders}</td><td class="amount">¥${c.revenue.toLocaleString()}</td><td style="color:${parseFloat(roi)>0?'var(--green)':'var(--text-light)'}">${roi}%</td></tr>`;
  }).join('')}</tbody></table></div>
  <div class="charts-row" style="margin-top:24px"><div class="chart-card"><div class="chart-header"><div><div class="chart-title">活动营收对比</div></div></div><div class="chart-container"><canvas id="campRevenueChart"></canvas></div></div><div class="chart-card"><div class="chart-header"><div><div class="chart-title">预算使用率</div></div></div><div class="chart-container"><canvas id="campBudgetChart"></canvas></div></div></div>`;
  chartInstances.campRev=new Chart(document.getElementById('campRevenueChart'),{type:'bar',data:{labels:campaigns.map(c=>c.name),datasets:[{label:'花费',data:campaigns.map(c=>c.spent),backgroundColor:'rgba(239,68,68,.6)',borderRadius:4},{label:'营收',data:campaigns.map(c=>c.revenue),backgroundColor:'rgba(79,70,229,.7)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true}}},scales:{x:{ticks:{font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>'¥'+(v/1000)+'k'},grid:{color:'#F1F5F9'}}}}});
  chartInstances.campBudget=new Chart(document.getElementById('campBudgetChart'),{type:'doughnut',data:{labels:campaigns.map(c=>c.name),datasets:[{data:campaigns.map(c=>Math.round(c.spent/c.budget*100)),backgroundColor:['#4F46E5','#10B981','#F97316','#EC4899','#94A3B8','#06B6D4']}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:10}}},tooltip:{callbacks:{label:ctx=>ctx.label+': 使用'+ctx.parsed+'%'}}}}});
}

// =================== FINANCE PAGE ===================
function renderFinance(el){
  const fd=financeData;
  const totalRev=fd.revenue.reduce((a,b)=>a+b,0);
  const totalCost=fd.cost.reduce((a,b)=>a+b,0);
  const totalProfit=fd.profit.reduce((a,b)=>a+b,0);
  const avgMargin=(totalProfit/totalRev*100).toFixed(1);
  el.innerHTML=`
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--primary-light)">💰</div><div class="stat-label">年度营收</div></div><div class="stat-value">¥${totalRev.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:#FEE2E2">📉</div><div class="stat-label">年度成本</div></div><div class="stat-value">¥${totalCost.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--green-light)">📈</div><div class="stat-label">年度利润</div></div><div class="stat-value">¥${totalProfit.toLocaleString()}</div></div>
    <div class="stat-card"><div class="stat-header"><div class="stat-icon" style="background:var(--orange-light)">📊</div><div class="stat-label">平均利润率</div></div><div class="stat-value">${avgMargin}%</div></div>
  </div>
  <div class="chart-card" style="margin-bottom:24px"><div class="chart-header"><div><div class="chart-title">月度财务趋势</div><div class="chart-subtitle">近12个月收入、成本与利润走势</div></div></div><div class="chart-container" style="height:320px"><canvas id="financeChart"></canvas></div></div>
  <div class="charts-row"><div class="chart-card"><div class="chart-header"><div><div class="chart-title">月度利润率</div></div></div><div class="chart-container"><canvas id="marginChart"></canvas></div></div><div class="chart-card"><div class="chart-header"><div><div class="chart-title">成本构成</div></div></div><div class="chart-container"><canvas id="costChart"></canvas></div></div></div>
  <div class="table-card" style="margin-top:24px"><div class="chart-title" style="margin-bottom:16px">月度财务明细</div><table><thead><tr><th>月份</th><th>营收</th><th>成本</th><th>利润</th><th>利润率</th><th>环比增长</th></tr></thead>
  <tbody>${fd.months.map((m,i)=>{
    const margin=(fd.profit[i]/fd.revenue[i]*100).toFixed(1);
    const growth=i>0?((fd.revenue[i]-fd.revenue[i-1])/fd.revenue[i-1]*100).toFixed(1):'-';
    return`<tr><td style="font-weight:600">${m}</td><td>¥${fd.revenue[i].toLocaleString()}</td><td>¥${fd.cost[i].toLocaleString()}</td><td class="amount">¥${fd.profit[i].toLocaleString()}</td><td>${margin}%</td><td style="color:${growth>=0?'var(--green)':'var(--red)'}">${growth!=='-'?(growth>=0?'▲':'▼')+Math.abs(growth)+'%':'-'}</td></tr>`;
  }).join('')}</tbody></table></div>`;

  chartInstances.finance=new Chart(document.getElementById('financeChart'),{type:'line',data:{labels:fd.months,datasets:[{label:'营收',data:fd.revenue,borderColor:'#4F46E5',backgroundColor:'rgba(79,70,229,.08)',fill:true,tension:.4,borderWidth:2.5},{label:'成本',data:fd.cost,borderColor:'#EF4444',borderDash:[6,3],tension:.4,borderWidth:2},{label:'利润',data:fd.profit,borderColor:'#10B981',tension:.4,borderWidth:2.5}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': ¥'+ctx.parsed.y.toLocaleString()}},legend:{position:'top',labels:{usePointStyle:true,padding:20}}},scales:{x:{grid:{display:false}},y:{ticks:{callback:v=>'¥'+(v/1000)+'k'},grid:{color:'#F1F5F9'}}}}});

  const margins=fd.months.map((_,i)=>(fd.profit[i]/fd.revenue[i]*100).toFixed(1));
  chartInstances.margin=new Chart(document.getElementById('marginChart'),{type:'bar',data:{labels:fd.months,datasets:[{label:'利润率(%)',data:margins,backgroundColor:margins.map(v=>v>=40?'rgba(16,185,129,.7)':v>=30?'rgba(79,70,229,.7)':'rgba(249,115,22,.7)'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{callback:v=>v+'%'},grid:{color:'#F1F5F9'}}}}});

  chartInstances.cost=new Chart(document.getElementById('costChart'),{type:'doughnut',data:{labels:['商品成本','物流','营销','运营','技术'],datasets:[{data:[45,18,15,12,10],backgroundColor:['#4F46E5','#10B981','#F97316','#EC4899','#94A3B8']}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{position:'right',labels:{font:{size:11}}}}}});
}
